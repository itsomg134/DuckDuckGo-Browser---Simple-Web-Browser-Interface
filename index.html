<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Duck Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Browser Chrome */
        .browser-header {
            background: #1a1a1a;
            color: white;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-buttons {
            display: flex;
            gap: 5px;
        }

        .nav-btn {
            background: #333;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: #444;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .url-bar {
            flex: 1;
            display: flex;
            gap: 5px;
            min-width: 300px;
        }

        #urlInput {
            flex: 1;
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background: #333;
            color: white;
            font-size: 14px;
            outline: none;
        }

        #urlInput:focus {
            background: #444;
        }

        .go-btn {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .go-btn:hover {
            background: #45a049;
        }

        .duck-btn {
            background: #de5833;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
        }

        .duck-btn:hover {
            background: #c44d2b;
        }

        /* Bookmarks Bar */
        .bookmarks-bar {
            background: #2d2d2d;
            padding: 5px 15px;
            display: flex;
            gap: 15px;
            color: #ccc;
            font-size: 13px;
            border-bottom: 1px solid #404040;
        }

        .bookmark-item {
            cursor: pointer;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .bookmark-item:hover {
            background: #404040;
            color: white;
        }

        /* Tabs */
        .tabs-container {
            background: #2d2d2d;
            padding: 8px 8px 0 8px;
            display: flex;
            gap: 2px;
            overflow-x: auto;
        }

        .tab {
            background: #404040;
            color: #ccc;
            padding: 8px 20px;
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            min-width: 150px;
            max-width: 200px;
            position: relative;
        }

        .tab.active {
            background: #1a1a1a;
            color: white;
        }

        .tab-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tab-close {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 16px;
            padding: 0 5px;
        }

        .tab-close:hover {
            color: white;
        }

        .new-tab-btn {
            background: #404040;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }

        /* Main Content Area */
        .browser-content {
            flex: 1;
            background: white;
            position: relative;
            overflow: hidden;
        }

        #webview {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* DuckDuckGo Search Page */
        .duck-homepage {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .duck-logo {
            font-size: 72px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .duck-search-box {
            width: 600px;
            max-width: 90%;
            background: white;
            border-radius: 40px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .duck-search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 18px;
            padding: 5px;
        }

        .duck-search-box button {
            background: #de5833;
            border: none;
            color: white;
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .duck-search-box button:hover {
            background: #c44d2b;
        }

        /* Status Bar */
        .status-bar {
            background: #1a1a1a;
            color: #ccc;
            padding: 3px 15px;
            font-size: 12px;
            display: flex;
            gap: 20px;
        }

        .loading-indicator {
            color: #4CAF50;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .browser-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .url-bar {
                min-width: auto;
            }
            
            .bookmarks-bar {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <!-- Browser Header -->
    <div class="browser-header">
        <div class="nav-buttons">
            <button class="nav-btn" id="backBtn" disabled>←</button>
            <button class="nav-btn" id="forwardBtn" disabled>→</button>
            <button class="nav-btn" id="reloadBtn">↻</button>
        </div>
        
        <div class="url-bar">
            <input type="text" id="urlInput" placeholder="Search with DuckDuckGo or enter URL">
            <button class="go-btn" id="goBtn">Go</button>
        </div>
        
        <button class="duck-btn" id="duckBtn">
            <span>🦆</span> Duck It!
        </button>
    </div>

    <!-- Tabs -->
    <div class="tabs-container" id="tabsContainer">
        <div class="tab active">
            <span class="tab-title">DuckDuckGo</span>
            <button class="tab-close">×</button>
        </div>
        <button class="new-tab-btn" id="newTabBtn">+</button>
    </div>

    <!-- Bookmarks Bar -->
    <div class="bookmarks-bar">
        <span class="bookmark-item" data-url="https://duckduckgo.com">🦆 DuckDuckGo</span>
        <span class="bookmark-item" data-url="https://www.google.com">G Google</span>
        <span class="bookmark-item" data-url="https://www.youtube.com">▶ YouTube</span>
        <span class="bookmark-item" data-url="https://github.com">💻 GitHub</span>
        <span class="bookmark-item" data-url="https://www.reddit.com">👽 Reddit</span>
        <span class="bookmark-item" data-url="https://www.wikipedia.org">🌐 Wikipedia</span>
    </div>

    <!-- Main Content -->
    <div class="browser-content">
        <div class="duck-homepage" id="homepage">
            <div class="duck-logo">🦆</div>
            <h1 style="margin-bottom: 30px;">DuckDuckGo Browser</h1>
            <div class="duck-search-box">
                <input type="text" id="duckSearchInput" placeholder="Search the web privately...">
                <button id="duckSearchBtn">Search</button>
            </div>
            <p style="margin-top: 30px; opacity: 0.8;">Privacy, simplified.</p>
        </div>
        <iframe id="webview" style="display: none;" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <span>🔒 Privacy Protected</span>
        <span class="loading-indicator" id="loadingStatus">Ready</span>
        <span>🦆 DuckDuckGo Search</span>
    </div>

    <script>
        class SimpleBrowser {
            constructor() {
                this.history = [];
                this.currentIndex = -1;
                this.tabs = [{ id: 1, title: 'DuckDuckGo', url: 'home' }];
                this.currentTab = 1;
                
                this.initElements();
                this.initEventListeners();
                this.updateNavButtons();
            }

            initElements() {
                this.webview = document.getElementById('webview');
                this.homepage = document.getElementById('homepage');
                this.urlInput = document.getElementById('urlInput');
                this.backBtn = document.getElementById('backBtn');
                this.forwardBtn = document.getElementById('forwardBtn');
                this.reloadBtn = document.getElementById('reloadBtn');
                this.goBtn = document.getElementById('goBtn');
                this.duckBtn = document.getElementById('duckBtn');
                this.duckSearchInput = document.getElementById('duckSearchInput');
                this.duckSearchBtn = document.getElementById('duckSearchBtn');
                this.loadingStatus = document.getElementById('loadingStatus');
                this.newTabBtn = document.getElementById('newTabBtn');
                this.tabsContainer = document.getElementById('tabsContainer');
                
                // Bookmarks
                document.querySelectorAll('.bookmark-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        this.navigateTo(e.target.dataset.url);
                    });
                });
            }

            initEventListeners() {
                this.goBtn.addEventListener('click', () => this.handleNavigation());
                this.urlInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.handleNavigation();
                });
                
                this.backBtn.addEventListener('click', () => this.goBack());
                this.forwardBtn.addEventListener('click', () => this.goForward());
                this.reloadBtn.addEventListener('click', () => this.reload());
                this.duckBtn.addEventListener('click', () => this.duckIt());
                
                this.duckSearchBtn.addEventListener('click', () => this.duckSearch());
                this.duckSearchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.duckSearch();
                });

                this.newTabBtn.addEventListener('click', () => this.createNewTab());
            }

            handleNavigation() {
                let url = this.urlInput.value.trim();
                if (!url) return;

                // Check if it's a search or URL
                if (!url.includes('.') || url.includes(' ')) {
                    // Treat as search query
                    url = `https://duckduckgo.com/?q=${encodeURIComponent(url)}`;
                } else {
                    // Add https:// if no protocol specified
                    if (!url.startsWith('http')) {
                        url = 'https://' + url;
                    }
                }

                this.navigateTo(url);
            }

            navigateTo(url) {
                this.loadingStatus.textContent = 'Loading...';
                
                if (url === 'home') {
                    this.webview.style.display = 'none';
                    this.homepage.style.display = 'flex';
                    this.urlInput.value = '';
                    this.loadingStatus.textContent = 'Ready';
                } else {
                    this.homepage.style.display = 'none';
                    this.webview.style.display = 'block';
                    this.webview.src = url;
                    this.urlInput.value = url;
                    
                    // Add to history
                    this.history = this.history.slice(0, this.currentIndex + 1);
                    this.history.push(url);
                    this.currentIndex = this.history.length - 1;
                    this.updateNavButtons();
                    
                    // Simulate loading complete
                    setTimeout(() => {
                        this.loadingStatus.textContent = 'Done';
                    }, 1000);
                }

                // Update tab title
                this.updateCurrentTabTitle(url === 'home' ? 'DuckDuckGo' : url);
            }

            duckSearch() {
                const query = this.duckSearchInput.value.trim();
                if (query) {
                    this.navigateTo(`https://duckduckgo.com/?q=${encodeURIComponent(query)}`);
                }
            }

            duckIt() {
                this.navigateTo('https://duckduckgo.com');
            }

            goBack() {
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                    this.navigateTo(this.history[this.currentIndex]);
                }
            }

            goForward() {
                if (this.currentIndex < this.history.length - 1) {
                    this.currentIndex++;
                    this.navigateTo(this.history[this.currentIndex]);
                }
            }

            reload() {
                if (this.webview.style.display !== 'none') {
                    this.webview.src = this.webview.src;
                }
            }

            updateNavButtons() {
                this.backBtn.disabled = this.currentIndex <= 0;
                this.forwardBtn.disabled = this.currentIndex >= this.history.length - 1;
            }

            createNewTab() {
                const tabId = Date.now();
                this.tabs.push({ id: tabId, title: 'New Tab', url: 'home' });
                this.renderTabs();
                this.switchToTab(tabId);
            }

            renderTabs() {
                // Remove existing tabs (keep the new tab button)
                const tabs = this.tabsContainer.querySelectorAll('.tab');
                tabs.forEach(tab => tab.remove());
                
                // Add tabs
                this.tabs.forEach(tab => {
                    const tabElement = document.createElement('div');
                    tabElement.className = `tab ${tab.id === this.currentTab ? 'active' : ''}`;
                    tabElement.dataset.tabId = tab.id;
                    tabElement.innerHTML = `
                        <span class="tab-title">${tab.title}</span>
                        <button class="tab-close" onclick="event.stopPropagation(); browser.closeTab(${tab.id})">×</button>
                    `;
                    tabElement.addEventListener('click', () => this.switchToTab(tab.id));
                    
                    // Insert before new tab button
                    this.tabsContainer.insertBefore(tabElement, this.newTabBtn);
                });
            }

            switchToTab(tabId) {
                this.currentTab = tabId;
                const tab = this.tabs.find(t => t.id === tabId);
                if (tab) {
                    this.navigateTo(tab.url);
                }
                this.renderTabs();
            }

            closeTab(tabId) {
                if (this.tabs.length > 1) {
                    this.tabs = this.tabs.filter(t => t.id !== tabId);
                    if (this.currentTab === tabId) {
                        this.switchToTab(this.tabs[0].id);
                    } else {
                        this.renderTabs();
                    }
                }
            }

            updateCurrentTabTitle(title) {
                const currentTab = this.tabs.find(t => t.id === this.currentTab);
                if (currentTab) {
                    currentTab.title = title.length > 20 ? title.substring(0, 20) + '...' : title;
                }
                this.renderTabs();
            }
        }

        // Initialize the browser
        const browser = new SimpleBrowser();
    </script>
</body>
</html>
